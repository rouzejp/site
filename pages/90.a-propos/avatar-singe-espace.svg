<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dégradé fond spatial -->
    <radialGradient id="space-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#111d36"/>
      <stop offset="50%" stop-color="#0b1428"/>
      <stop offset="100%" stop-color="#03040a"/>
    </radialGradient>

    <!-- Dégradé casque -->
    <radialGradient id="helmet-glint" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Dégradé visage singe -->
    <radialGradient id="face-grad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#a88d74"/>
      <stop offset="60%" stop-color="#8b6f58"/>
      <stop offset="100%" stop-color="#6d543e"/>
    </radialGradient>

    <!-- Dégradé combinaison -->
    <linearGradient id="suit-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4a6b"/>
      <stop offset="100%" stop-color="#1e2a45"/>
    </linearGradient>

    <!-- Filtre nébuleuse -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <!-- Masque casque -->
    <clipPath id="helmet-clip">
      <circle cx="256" cy="210" r="90"/>
    </clipPath>
  </defs>

  <!-- Fond spatial -->
  <rect width="512" height="512" fill="url(#space-bg)"/>

  <!-- Nébuleuse colorée -->
  <ellipse cx="200" cy="180" rx="180" ry="120" fill="#2a1a55" opacity="0.15" filter="url(#glow)"/>
  <ellipse cx="320" cy="300" rx="150" ry="100" fill="#1a2a55" opacity="0.12" filter="url(#glow)"/>

  <!-- Étoiles - grandes -->
  <circle cx="80" cy="60" r="2" fill="#fff" opacity="0.9"/>
  <circle cx="420" cy="45" r="2.5" fill="#fff" opacity="0.85"/>
  <circle cx="450" cy="150" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="60" cy="200" r="1.8" fill="#fff" opacity="0.75"/>
  <circle cx="470" cy="350" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="40" cy="400" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="380" cy="480" r="2.2" fill="#fff" opacity="0.7"/>
  <circle cx="130" cy="470" r="1.5" fill="#fff" opacity="0.65"/>
  <circle cx="30" cy="300" r="1.2" fill="#fff" opacity="0.5"/>

  <!-- Étoiles - petites -->
  <circle cx="150" cy="30" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="320" cy="70" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="480" cy="260" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="100" cy="140" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="400" cy="430" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="200" cy="490" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="350" cy="30" r="1" fill="#b8c6ff" opacity="0.6"/>
  <circle cx="490" cy="100" r="0.7" fill="#fff" opacity="0.3"/>
  <circle cx="50" cy="460" r="0.9" fill="#fff" opacity="0.4"/>

  <!-- Étoiles brillantes (cross) -->
  <g transform="translate(380, 120)" opacity="0.8">
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#fff" stroke-width="1"/>
    <circle cx="0" cy="0" r="1.5" fill="#fff"/>
  </g>
  <g transform="translate(90, 350)" opacity="0.6">
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#fff" stroke-width="0.8"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#fff" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="1" fill="#fff"/>
  </g>

  <!-- Planète lointaine -->
  <circle cx="400" cy="80" r="30" fill="none" stroke="#4a6a8a" stroke-width="0.8" opacity="0.3"/>
  <circle cx="400" cy="80" r="25" fill="#2a4a6a" opacity="0.15"/>
  <ellipse cx="390" cy="75" rx="3" ry="1" fill="#6a8aaa" opacity="0.2" transform="rotate(-20 390 75)"/>

  <!-- ========== CORPS / COMBINAISON SPATIALE ========== -->

  <!-- Épaules - combinaison -->
  <ellipse cx="256" cy="380" rx="120" ry="60" fill="url(#suit-grad)" stroke="#4a6a9a" stroke-width="1.5"/>

  <!-- Torse combinaison -->
  <path d="M200 350 Q200 290 220 270 L292 270 Q312 290 312 350 Z" fill="url(#suit-grad)" stroke="#4a6a9a" stroke-width="1"/>

  <!-- Détails combinaison - lignes -->
  <path d="M230 350 L230 280" stroke="#5a7aaa" stroke-width="0.8" opacity="0.5"/>
  <path d="M282 350 L282 280" stroke="#5a7aaa" stroke-width="0.8" opacity="0.5"/>

  <!-- Badge/cachet sur la poitrine -->
  <circle cx="256" cy="315" r="12" fill="none" stroke="#6a8aba" stroke-width="1" opacity="0.4"/>
  <circle cx="256" cy="315" r="8" fill="#4a5a7a" opacity="0.3"/>

  <!-- ========== CASQUE ========== -->

  <!-- Cercle extérieur du casque -->
  <circle cx="256" cy="210" r="95" fill="none" stroke="#7a9abc" stroke-width="3" opacity="0.6"/>

  <!-- Visière / espace intérieur du casque -->
  <circle cx="256" cy="210" r="90" fill="#0a1225" opacity="0.3"/>

  <!-- Anneau du cou / collier -->
  <ellipse cx="256" cy="290" rx="55" ry="12" fill="#3a4a6a" stroke="#5a7aaa" stroke-width="1.5"/>

  <!-- ========== TÊTE DE SINGE ========== -->

  <!-- Tête du singe (à l'intérieur du casque) -->
  <ellipse cx="256" cy="215" rx="60" ry="55" fill="#6d543e"/>

  <!-- Face du singe (zone plus claire) -->
  <ellipse cx="256" cy="220" rx="42" ry="38" fill="url(#face-grad)"/>

  <!-- Arcades sourcilières -->
  <path d="M220 195 Q236 188 240 192" fill="none" stroke="#4a3528" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M272 192 Q276 188 292 195" fill="none" stroke="#4a3528" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Yeux -->
  <ellipse cx="238" cy="210" rx="10" ry="11" fill="#1a1210"/>
  <ellipse cx="274" cy="210" rx="10" ry="11" fill="#1a1210"/>
  <ellipse cx="238" cy="210" rx="8" ry="9" fill="#2a1a10"/>
  <ellipse cx="274" cy="210" rx="8" ry="9" fill="#2a1a10"/>
  <!-- Pupilles -->
  <circle cx="240" cy="210" r="4" fill="#0a0808"/>
  <circle cx="276" cy="210" r="4" fill="#0a0808"/>
  <!-- Reflets dans les yeux -->
  <circle cx="242" cy="207" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="278" cy="207" r="2" fill="#fff" opacity="0.6"/>

  <!-- Nez -->
  <ellipse cx="256" cy="228" rx="8" ry="5" fill="#4a3528"/>
  <circle cx="252" cy="228" r="2" fill="#3a2518"/>
  <circle cx="260" cy="228" r="2" fill="#3a2518"/>

  <!-- Bouche -->
  <path d="M244 240 Q250 246 256 242 Q262 246 268 240" fill="none" stroke="#4a3528" stroke-width="2" stroke-linecap="round"/>

  <!-- Oreilles -->
  <ellipse cx="195" cy="210" rx="12" ry="16" fill="#6d543e" stroke="#5a4538" stroke-width="1"/>
  <ellipse cx="195" cy="210" rx="7" ry="10" fill="#8b6f58"/>
  <ellipse cx="317" cy="210" rx="12" ry="16" fill="#6d543e" stroke="#5a4538" stroke-width="1"/>
  <ellipse cx="317" cy="210" rx="7" ry="10" fill="#8b6f58"/>

  <!-- Fourrure sombre sur le dessus de la tête -->
  <path d="M200 185 Q220 155 256 160 Q292 155 312 185 Q300 175 256 172 Q212 175 200 185 Z" fill="#3a2518" opacity="0.6"/>

  <!-- ========== REFLET CASQUE ========== -->

  <!-- Reflet sur la visière -->
  <circle cx="256" cy="210" r="90" fill="url(#helmet-glint)"/>

  <!-- Reflet lumineux en haut à gauche du casque -->
  <ellipse cx="220" cy="170" rx="25" ry="10" fill="#fff" opacity="0.06" transform="rotate(-30 220 170)"/>
  <ellipse cx="218" cy="168" rx="12" ry="5" fill="#fff" opacity="0.08" transform="rotate(-30 218 168)"/>

  <!-- ========== ÉLÉMENTS DE LA COMBINAISON ========== -->

  <!-- Détails du collier -->
  <ellipse cx="256" cy="290" rx="52" ry="10" fill="none" stroke="#6a8aba" stroke-width="0.5" opacity="0.4"/>

  <!-- Accents rouges/signalétiques sur la combinaison -->
  <rect x="245" y="335" width="4" height="12" rx="2" fill="#cc4433" opacity="0.7"/>
  <rect x="263" y="335" width="4" height="12" rx="2" fill="#cc4433" opacity="0.7"/>

  <!-- ========== BULLES FLOTTANTES ========== -->
  <circle cx="120" cy="280" r="4" fill="none" stroke="#5a7aaa" stroke-width="0.5" opacity="0.3"/>
  <circle cx="135" cy="300" r="2.5" fill="none" stroke="#5a7aaa" stroke-width="0.5" opacity="0.25"/>
  <circle cx="380" cy="250" r="3" fill="none" stroke="#5a7aaa" stroke-width="0.5" opacity="0.2"/>
  <circle cx="395" cy="270" r="1.5" fill="none" stroke="#5a7aaa" stroke-width="0.5" opacity="0.15"/>
</svg>
